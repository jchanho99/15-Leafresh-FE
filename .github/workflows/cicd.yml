  #       run: |
  #         if [[ "${{ github.ref_name }}" == "develop" ]]; then
  #           echo "tag=jchanho99/frontend-dev:latest" >> $GITHUB_OUTPUT
  #         elif [[ "${{ github.ref_name }}" == "main" ]]; then
  #           echo "tag=jchanho99/frontend-prod:latest" >> $GITHUB_OUTPUT
